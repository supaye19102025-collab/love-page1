<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ For You ❤️</title>

<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ff4d6d,#ff85a2);
font-family:Arial,sans-serif;
overflow:hidden;
}

.card{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.3);
animation:pop 1s;
}

h1{
color:#ff3366;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
background:#ff3366;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#ff0044;
}

@keyframes pop{
from{transform:scale(.5);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.heart{
position:absolute;
color:red;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-100px);}
}
</style>
</head>

<body>

<div class="card">
<h1>❤️ Hello ❤️</h1>
<p>မင်းကို ဒီနေ့ ပြုံးစေချင်လို့ ဒီ Page လေးလုပ်ထားတာ။</p>

<button onclick="showLove()">Click Me 💖</button>

<h2 id="love"></h2>

</div>

<script>

function showLove(){
document.getElementById("love").innerHTML="I Love You ❤️";
}

setInterval(()=>{
let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.className="heart";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*30)+"px";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},300);

</script>

</body>
</html>
