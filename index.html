<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffe6eb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        h1 {
            color: #ff4a75;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .gif-container img {
            width: 150px;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 50px;
            position: relative;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #yesBtn {
            background-color: #ff4a75;
            color: white;
        }

        #yesBtn:hover {
            background-color: #e0355f;
            transform: scale(1.1);
        }

        #noBtn {
            background-color: #858585;
            color: white;
            position: absolute;
            left: 55%;
        }

        /* Celebrate Screen */
        .hidden {
            display: none;
        }

        .celebrate h1 {
            font-size: 2.2rem;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div class="gif-container">
            <!-- ချစ်စရာကောင်းတဲ့ GIF ပုံလေး -->
            <img src="https://media.tenor.com/t776V5B26XIAAAAi/cute-bear.gif" alt="Cute Bear">
        </div>
        <h1>ငါ့ကို ချစ်လား? 🥺👉👈</h1>
        <p>တကယ်မေးတာနော်...</p>
        
        <div class="btn-group">
            <button id="yesBtn" onclick="selectYes()">ချစ်တယ်</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">မချစ်ဘူး</button>
        </div>
    </div>

    <!-- Yes နှိပ်ပြီးရင် ပေါ်လာမယ့် စာမျက်နှာ -->
    <div class="container hidden" id="celebrateContainer">
        <div class="gif-container">
            <img src="https://media.tenor.com/g9vN645Yv6sAAAAi/onload-unbothered.gif" alt="Happy Dance">
        </div>
        <h1>Yeayyyyy!!! 🎉💖</h1>
        <p>ငါလည်း အရမ်းချစ်တယ်နော်! ဓာတ်ပုံလေး ရိုက်ပြီး လာပြဦး ဟီးး။</p>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const mainContainer = document.getElementById('mainContainer');
        const celebrateContainer = document.getElementById('celebrateContainer');

        // "No" ခလုတ်ကို ထိလိုက်တာနဲ့ ထွက်ပြေးမယ့် Function
        function moveButton() {
            // Container ရဲ့ အကျယ်အဝန်းကို တွက်ချက်ခြင်း
            const containerWidth = mainContainer.clientWidth;
            const containerHeight = mainContainer.clientHeight;

            // ခလုတ်ကို ရွေ့စေမည့် Random နေရာအသစ် သတ်မှတ်ခြင်း
            const newX = Math.random() * (containerWidth - noBtn.clientWidth - 40);
            const newY = Math.random() * (containerHeight - noBtn.clientHeight - 80);

            // စတိုင်ကို ပြောင်းလဲခြင်း
            noBtn.style.left = `${newX}px`;
            noBtn.style.top = `${newY}px`;
        }

        // "Yes" ကို နှိပ်လိုက်ရင်
        function selectYes() {
            mainContainer.classList.add('hidden');
            celebrateContainer.classList.remove('hidden');
        }
    </script>
</body>
</html>
